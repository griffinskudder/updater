name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'go.mod'

      - name: Check formatting
        # Equivalent to: make fmt-check
        run: |
          unformatted=$(gofmt -l .)
          [ -z "$unformatted" ] || (printf "Unformatted files:\n$unformatted\n" && exit 1)

      - name: Vet
        # Equivalent to: make vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'go.mod'

      - name: Coverage
        # Equivalent to: make cover, with a 70% threshold gate.
        # Mirrors the Makefile exactly: -tags integration is applied to both the
        # package list and the test run so coverage includes integration tests.
        run: |
          set -euo pipefail
          PKGS=$(go list -tags integration ./... | grep -vE '/cmd/|/storage/sqlc/')
          go test -tags integration -coverpkg=$(echo $PKGS | tr ' ' ',') -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total/ {gsub(/%/, "", $3); print $3}')
          THRESHOLD=70.0
          echo "Coverage:  ${COVERAGE}%"
          echo "Threshold: ${THRESHOLD}%"
          awk "BEGIN {
            if (${COVERAGE} + 0 < ${THRESHOLD} + 0) {
              print \"FAIL: coverage \" ${COVERAGE} \"% is below threshold \" ${THRESHOLD} \"%\"
              exit 1
            }
            print \"PASS: coverage \" ${COVERAGE} \"% meets threshold \" ${THRESHOLD} \"%\"
          }"

  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'go.mod'

      - name: Integration tests
        # Equivalent to: make integration-test
        run: go test -tags integration ./internal/integration/...

  spec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate OpenAPI spec
        # Equivalent to: make openapi-validate
        run: make openapi-validate

      - name: Validate SQL schemas
        # Equivalent to: make sqlc-vet
        run: make sqlc-vet

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'go.mod'

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Enforce security threshold
        # Equivalent to: make security
        run: gosec -severity high -confidence medium ./...

      - name: Scan for secrets
        # Equivalent to: make secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  race:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'go.mod'

      - name: Race detector
        # No make equivalent: the GO_DOCKER macro sets CGO_ENABLED=0, which disables
        # the race detector. This job runs natively so CGO is available.
        run: go test -race ./...

  required:
    runs-on: ubuntu-latest
    needs: [lint, test, integration, spec, security, race]
    if: always()
    permissions:
      contents: read
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required jobs passed"
